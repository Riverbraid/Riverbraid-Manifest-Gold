name: Daily Cluster Audit
on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Path Audit
        run: |
          echo "Current Path: $(pwd)"
          ls -la verify-cluster.sh || echo "ERROR: SCRIPT STILL MISSING FROM REMOTE"

      - name: Execute
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use bash explicitly to bypass binary execution limits
          /bin/bash ./verify-cluster.sh
