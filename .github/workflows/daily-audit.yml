name: Daily Cluster Audit
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

# Resolve Deprecation: Opt-in to Node 24 for the Runner
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug Environment
        run: |
          echo "--- Files in Root ---"
          ls -F
          echo "--- Shell Check ---"
          which bash

      - name: Run cluster verification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use bash explicitly to avoid Command Not Found (127)
          # We check if the file exists first to avoid silent skips
          if [ -f "./verify-cluster.sh" ]; then
            /bin/bash ./verify-cluster.sh
          else
            echo "CRITICAL ERROR: verify-cluster.sh not found in $(pwd)"
            exit 1
          fi
