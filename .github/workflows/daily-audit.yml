name: Daily Cluster Audit
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

env:
  # This kills the deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Path Diagnostic
        run: |
          echo "Workspace: $(pwd)"
          ls -la verify-cluster.sh || (echo "CRITICAL: Script not found on remote" && exit 1)

      - name: Run cluster verification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use explicit bash interpreter to bypass execution bit issues
          /bin/bash ./verify-cluster.sh
