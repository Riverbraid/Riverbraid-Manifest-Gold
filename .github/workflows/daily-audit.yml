name: Daily Cluster Audit
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Debug Workspace
        run: |
          echo "Current Directory: $(pwd)"
          ls -la
        
      - name: Run cluster verification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use bash explicitly to avoid 'Command Not Found' (127)
          /bin/bash ./verify-cluster.sh
