name: Daily Cluster Audit
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run cluster verification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f "./verify-cluster.sh" ]; then
            /bin/bash ./verify-cluster.sh
          else
            echo "CRITICAL ERROR: verify-cluster.sh not found."
            exit 1
          fi
