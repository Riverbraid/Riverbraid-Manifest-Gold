name: Daily Cluster Audit
on:
  workflow_dispatch: # Allows you to trigger this manually from the Actions tab

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Locate Verifier Script
        run: |
          echo "--- Current Working Directory ---"
          pwd
          echo "--- Listing All Files Recursively ---"
          find . -maxdepth 2 -not -path '*/.*'
          echo "--- Checking Executable Bits ---"
          ls -la verify-cluster.sh || echo "FILE NOT FOUND"

      - name: Attempt Execution (Direct)
        run: |
          if [ -f "./verify-cluster.sh" ]; then
            bash ./verify-cluster.sh
          else
            echo "Skipping execution: File missing."
            exit 1
          fi
